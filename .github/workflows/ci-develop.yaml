name: Lint HTML and CSS

on:
  pull_request:
    branches: [develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install linters
        run: |
          npm init -y
          npm install -D htmlhint stylelint stylelint-config-standard

      - name: Run HTMLHint
        run: npx htmlhint "src/**/*.html"

      - name: Run Stylelint
        run: npx stylelint "styles/**/*.css"
